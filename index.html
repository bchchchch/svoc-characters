<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Персонажи</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background"></div>

    <div class="frame-container">
        
        <div class="overlay" id="overlay"></div>
        
        <!-- ШАПКА -->
        <div class="frame-header">
            <div class="header-content">
                <div class="logo">
                    <img src="images/logo.png" alt="Логотип">
                </div>
                <h1>Stardew Valley OC | Навигация по персонажам</h1>
                <div class="header-nav">
                    <a href="https://vk.com/stardewoc" target="_blank" class="header-text-link">Группа в ВК</a>
                    <a href="https://vk.com/board236063317" target="_blank" class="header-text-link">Альбомы</a>
                    <a href="https://vk.com/albums-236063317" target="_blank" class="header-text-link">Обсуждения</a>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
                    <div class="search-results" id="searchResults"></div>
                </div>
            </div>
        </div>
        
        <div class="frame-left"></div>
        <div class="frame-right"></div>
        <div class="frame-bottom"></div>
        <div class="corner-left"></div>
        <div class="corner-right"></div>
        
        <div class="rail-container">
            <div class="rail-track" id="scrollTrack">
                <div class="rail-thumb" id="scrollThumb">
                    <img src="images/gui/slider_2.png" alt="Ползунок">
                </div>
            </div>
        </div>
        
        <div class="frame-content" id="frameContent">
            <div class="left-column">
                <div class="buttons-container" id="buttonsContainer"></div>
            </div>
            <div class="preview-container" id="previewContainer">
                <div class="portraits-row" id="portraitsRow"></div>
            </div>
        </div>
        
        <div class="cards-container" id="cardsContainer"></div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
